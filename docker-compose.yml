services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: memcoin
      POSTGRES_PASSWORD: memcoin
      POSTGRES_DB: memcoin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memcoin"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker -l info
    env_file: ./backend/.env
    depends_on:
      - postgres
      - redis

  beat:
    build: ./backend
    command: celery -A app.tasks.celery_app beat -l info
    env_file: ./backend/.env
    depends_on:
      - postgres
      - redis

  web:
    build: ./web
    command: pnpm start
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
      NEXT_PUBLIC_WS_BASE: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
